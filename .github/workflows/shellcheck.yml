name: ShellCheck

on:
  push:
    paths:
      - '**.sh'
      - 'openclaw-deploy'
      - 'lib/**'
  pull_request:
    paths:
      - '**.sh'
      - 'openclaw-deploy'
      - 'lib/**'

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          ignore_paths: >-
            skill-formatter
            bailian-quota-switcher
          severity: warning
