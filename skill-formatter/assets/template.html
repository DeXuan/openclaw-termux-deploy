<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title><!-- ARTICLE_TITLE --></title>
<style>
body{max-width:680px;margin:0 auto;padding:16px;font:16px/1.8 -apple-system,"PingFang SC","Microsoft YaHei",sans-serif;color:#333}
h1{font-size:22px;text-align:center;margin:10px 0 24px}
h2{font-size:19px;margin:36px 0 12px;padding-left:10px;border-left:4px solid #07c160}
h3{font-size:17px;margin:20px 0 8px}
blockquote{background:#f6f6f6;border-left:4px solid #ddd;margin:0;padding:8px 16px;color:#666;font-size:15px}
pre{background:#2d2d2d;color:#e6e6e6;padding:14px 16px;border-radius:6px;overflow-x:auto;font:14px/1.5 Consolas,monospace;white-space:pre-wrap}
code{font:14px/1.5 Consolas,monospace;background:#f0f0f0;padding:1px 5px;border-radius:3px}
pre code{background:none;padding:0}
table{border-collapse:collapse;width:100%;margin:10px 0;font-size:14px}
th,td{border:1px solid #ddd;padding:8px 10px;text-align:left}
th{background:#f6f6f6;font-weight:bold}
tr:nth-child(even){background:#fafafa}
.warn{background:#fff3cd;border-left:4px solid #ffc107;padding:10px 16px;margin:14px 0;font-size:15px;border-radius:0 6px 6px 0}
.tip{background:#d4edda;border-left:4px solid #28a745;padding:10px 16px;margin:14px 0;font-size:15px;border-radius:0 6px 6px 0}
ul,ol{padding-left:24px}
li{margin:4px 0}
hr{border:none;border-top:1px solid #eee;margin:30px 0}
.footer{text-align:center;color:#999;font-size:13px;margin-top:40px;padding-top:20px;border-top:1px solid #eee}
</style>
</head>
<body>

<!--
  ===== 内容填写规则 =====
  h1          → 文章主标题（每篇一个）
  h2          → 二级标题（左侧微信绿 #07c160 边线强调）
  h3          → 三级标题
  p           → 正文段落
  strong      → 加粗强调（不要用 b 标签）
  blockquote  → 引用/引言/摘要
  pre > code  → 代码块（深色背景，自动换行）
  code        → 行内代码（浅灰背景）
  table       → 表格（偶数行浅灰底色，表头加粗）
  p.warn      → ⚠️ 警告/踩坑提示（黄色背景 + 橙色左边线）
  p.tip       → 💡 提示/技巧（绿色背景 + 绿色左边线）
  ul / ol     → 无序/有序列表
  hr          → 分隔线
  p.footer    → 文末署名/声明
  ===========================
-->

<!-- ARTICLE_BODY_START -->

<h1><!-- 文章标题 --></h1>

<!--
  在此填充文章正文。
  代码块中的 < > & 必须转义为 &lt; &gt; &amp;
  <pre> 内不额外加 <p> 标签
-->

<p class="footer"><!-- 文末声明：设备型号 / 软件版本 / 免责等 --></p>

<!-- ARTICLE_BODY_END -->

</body>
</html>
